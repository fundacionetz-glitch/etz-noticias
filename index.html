<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a3a2a" />
  <meta name="description" content="Noticias cristianas con motivo de oración - Fundación Etz" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Etz Noticias</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />

  <style>
    :root {
      --verde-oscuro: #1a3a2a;
      --verde-medio: #2d5a3d;
      --verde-claro: #4a8c5c;
      --dorado: #c9a84c;
      --dorado-suave: #e8d5a3;
      --crema: #f8f4ed;
      --texto: #2c1810;
      --texto-suave: #5c4a3a;
      --blanco: #ffffff;
      --sombra: rgba(26,58,42,0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Source Serif 4', Georgia, serif;
      background: var(--crema);
      color: var(--texto);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--verde-oscuro);
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-area {
      display: flex;
      flex-direction: column;
    }

    .logo-nombre {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--dorado);
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .logo-sub {
      font-size: 0.7rem;
      color: var(--dorado-suave);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 3px;
      opacity: 0.8;
    }

    .cruz {
      font-size: 1.8rem;
      color: var(--dorado);
      opacity: 0.9;
    }

    /* BARRA CATEGORIAS */
    .categorias {
      background: var(--verde-medio);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .categorias::-webkit-scrollbar { display: none; }

    .categorias-inner {
      display: flex;
      gap: 4px;
      padding: 8px 16px;
      max-width: 800px;
      margin: 0 auto;
    }

    .cat-btn {
      background: transparent;
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--dorado-suave);
      padding: 5px 14px;
      border-radius: 20px;
      font-family: 'Source Serif 4', serif;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .cat-btn:hover, .cat-btn.activo {
      background: var(--dorado);
      color: var(--verde-oscuro);
      border-color: var(--dorado);
      font-weight: 600;
    }

    /* CONTENIDO PRINCIPAL */
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    /* ESTADO DE CARGA */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 16px;
    }

    .loading-cruz {
      font-size: 2.5rem;
      animation: pulsar 1.5s ease-in-out infinite;
    }

    @keyframes pulsar {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.9); }
    }

    .loading p {
      color: var(--texto-suave);
      font-style: italic;
      font-size: 0.95rem;
    }

    /* TARJETA DE NOTICIA */
    .noticia {
      background: var(--blanco);
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: 0 2px 12px var(--sombra);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: aparecer 0.4s ease forwards;
      opacity: 0;
    }

    @keyframes aparecer {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .noticia:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px var(--sombra);
    }

    .noticia-imagen {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      background: var(--verde-medio);
    }

    .noticia-imagen-placeholder {
      width: 100%;
      height: 140px;
      background: linear-gradient(135deg, var(--verde-oscuro), var(--verde-medio));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: rgba(201,168,76,0.4);
    }

    .noticia-body {
      padding: 20px;
    }

    .noticia-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .noticia-fuente {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--verde-claro);
      font-weight: 600;
    }

    .noticia-categoria {
      font-size: 0.65rem;
      background: var(--dorado-suave);
      color: var(--texto-suave);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .noticia-fecha {
      font-size: 0.7rem;
      color: #aaa;
      margin-left: auto;
    }

    .noticia-titulo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--texto);
      margin-bottom: 12px;
    }

    .noticia-resumen {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--texto-suave);
      font-weight: 300;
      margin-bottom: 16px;
    }

    /* MOTIVO DE ORACIÓN */
    .oracion {
      background: linear-gradient(135deg, #f0f7f2, #e8f4ec);
      border-left: 3px solid var(--verde-claro);
      border-radius: 0 8px 8px 0;
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    .oracion-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--verde-claro);
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .oracion-texto {
      font-size: 0.88rem;
      line-height: 1.55;
      color: var(--verde-oscuro);
      font-style: italic;
    }

    .noticia-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--verde-claro);
      text-decoration: none;
      border: 1px solid var(--verde-claro);
      padding: 7px 14px;
      border-radius: 20px;
      transition: all 0.2s;
    }

    .noticia-link:hover {
      background: var(--verde-claro);
      color: white;
    }

    /* SIN NOTICIAS */
    .sin-noticias {
      text-align: center;
      padding: 60px 20px;
      color: var(--texto-suave);
    }

    .sin-noticias h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      margin-bottom: 10px;
      color: var(--verde-oscuro);
    }

    /* FOOTER */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--verde-oscuro);
      padding: 10px 20px;
      text-align: center;
    }

    .footer-texto {
      font-size: 0.7rem;
      color: rgba(232,213,163,0.6);
      letter-spacing: 0.05em;
    }

    /* RESPONSIVE */
    @media (min-width: 600px) {
      .noticia-titulo { font-size: 1.4rem; }
      .noticia-resumen { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo-area">
        <span class="logo-nombre">Etz Noticias</span>
        <span class="logo-sub">Fundación Etz · Fe y Actualidad</span>
      </div>
      <span class="cruz">✝</span>
    </div>
    <div class="categorias">
      <div class="categorias-inner" id="categoriasBar">
  <button class="cat-btn activo" onclick="filtrar('todas', this)">Todas</button>
  <button class="cat-btn" onclick="filtrar('Locales', this)">Locales</button>
  <button class="cat-btn" onclick="filtrar('Nacionales', this)">Nacionales</button>
  <button class="cat-btn" onclick="filtrar('Internacionales', this)">Internacionales</button>
  <button class="cat-btn" onclick="filtrar('Guerras', this)">Guerras</button>
  <button class="cat-btn" onclick="filtrar('Persecución', this)">Persecución</button>
  <button class="cat-btn" onclick="filtrar('Entretenimiento', this)">Entretenimiento</button>
  <button class="cat-btn" onclick="filtrar('Buenas Nuevas', this)">Buenas Nuevas</button>
</div>
    </div>
  </header>

  <main id="contenido">
    <div class="loading">
      <span class="loading-cruz">✝</span>
      <p>Cargando noticias...</p>
    </div>
  </main>

  <footer>
    <p class="footer-texto">Fundación Etz · Noticias con propósito y oración</p>
  </footer>

  <script>
    // ═══════════════════════════════════════
    // CONFIGURACIÓN — edita solo estas líneas
    // ═══════════════════════════════════════
    const SUPABASE_URL = 'https://qbippfunrcyyktqylqdg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_xru5mo382WrDibqtKuAy8Q_E5OuVWZS'; // Reemplaza con tu publishable key

    // ═══════════════════════════════════════
    let todasNoticias = [];
    let categoriaActual = 'todas';

    async function cargarNoticias() {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/noticias?select=*&publicado=eq.true&order=fecha_publicacion.desc&limit=50`,
          {
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`
            }
          }
        );

        if (!res.ok) throw new Error('Error al cargar noticias');
        todasNoticias = await res.json();
        mostrarNoticias(todasNoticias);

      } catch (err) {
        document.getElementById('contenido').innerHTML = `
          <div class="sin-noticias">
            <h3>No se pudieron cargar las noticias</h3>
            <p>Verifica tu conexión e intenta de nuevo.</p>
          </div>`;
      }
    }

    function filtrar(categoria, btn) {
      categoriaActual = categoria;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('activo'));
      btn.classList.add('activo');
      const filtradas = categoria === 'todas'
        ? todasNoticias
        : todasNoticias.filter(n => n.categoria === categoria);
      mostrarNoticias(filtradas);
    }

    function formatearFecha(fecha) {
      if (!fecha) return '';
      const d = new Date(fecha);
      return d.toLocaleDateString('es-CO', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function mostrarNoticias(noticias) {
      const contenido = document.getElementById('contenido');

      if (!noticias || noticias.length === 0) {
        contenido.innerHTML = `
          <div class="sin-noticias">
            <h3>No hay noticias disponibles</h3>
            <p>Las noticias se actualizan automáticamente cada 15 minutos.</p>
          </div>`;
        return;
      }

      contenido.innerHTML = noticias.map((n, i) => `
        <article class="noticia" style="animation-delay: ${i * 0.06}s">
          ${n.imagen_url
            ? `<img class="noticia-imagen" src="${n.imagen_url}" alt="${n.titulo}" onerror="this.style.display='none'" loading="lazy">`
            : `<div class="noticia-imagen-placeholder">✝</div>`
          }
          <div class="noticia-body">
            <div class="noticia-meta">
              <span class="noticia-fuente">${n.fuente || 'Noticias Cristianas'}</span>
              ${n.categoria ? `<span class="noticia-categoria">${n.categoria}</span>` : ''}
              <span class="noticia-fecha">${formatearFecha(n.fecha_publicacion)}</span>
            </div>
            <h2 class="noticia-titulo">${n.titulo}</h2>
            <p class="noticia-resumen">${n.resumen || ''}</p>
            ${n.motivo_oracion ? `
              <div class="oracion">
                <div class="oracion-label">🙏 Motivo de Oración</div>
                <p class="oracion-texto">${n.motivo_oracion}</p>
              </div>` : ''}
            ${n.url_original ? `
              <a class="noticia-link" href="${n.url_original}" target="_blank" rel="noopener">
                Leer noticia completa ↗
              </a>` : ''}
          </div>
        </article>
      `).join('');
    }

    // Registrar Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // Cargar al inicio
    cargarNoticias();
  </script>
</body>
</html>
